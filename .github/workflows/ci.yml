name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  source-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        node: ['20.20.2', '22.23.1', '24.18.0', '26.5.0']
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: ${{ matrix.node }}
          check-latest: false
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm test
      - run: npm run public:check
      - run: npm run audit:production
      - run: npm run build

  browser-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-assets
          ref: 2dd1e2844fd8b8deff8ea0e2620fd946e5c9544f
          path: public-assets
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna
          ref: 1e77e3e0d486c330fe9f9262b514ef24c859d469
          path: public-core
          sparse-checkout: fixtures/test_protected_entry.kdna
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: '22.23.1'
          check-latest: false
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Exercise browser inspect, LoadPlan, and Runtime load
        env:
          KDNA_DEMO_ASSET: ${{ github.workspace }}/public-assets/references/public/laozi-wuwei/laozi-wuwei-0.1.1.kdna
          KDNA_PROTECTED_DEMO_ASSET: ${{ github.workspace }}/public-core/fixtures/test_protected_entry.kdna
        run: npm run test:e2e
