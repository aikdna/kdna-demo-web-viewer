name: Verify release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.event.action == 'published' &&
      github.event.release.draft == false &&
      github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - name: Fetch authoritative main for ancestry verification
        run: git fetch --no-tags --prune origin refs/heads/main:refs/remotes/origin/main
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna-assets
          ref: 2dd1e2844fd8b8deff8ea0e2620fd946e5c9544f
          path: public-assets
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna
          ref: 1e77e3e0d486c330fe9f9262b514ef24c859d469
          path: public-core
          sparse-checkout: fixtures/test_protected_entry.kdna
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: '22.23.1'
          check-latest: false
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run release:context
      - run: npx playwright install --with-deps chromium
      - name: Verify exact source, build, and browser integration
        env:
          KDNA_DEMO_ASSET: ${{ github.workspace }}/public-assets/references/public/laozi-wuwei/laozi-wuwei-0.1.1.kdna
          KDNA_PROTECTED_DEMO_ASSET: ${{ github.workspace }}/public-core/fixtures/test_protected_entry.kdna
        run: npm run ci
